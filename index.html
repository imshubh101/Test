<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Someone Special 💖</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ee9ca7);
      background-size: 400% 400%;
      animation: gradient 10s ease infinite;
      overflow: hidden;
    }

    @keyframes gradient {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 {
      font-size: 2rem;
      min-height: 60px;
    }

    .btn {
      padding: 12px 30px;
      font-size: 18px;
      margin: 20px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yes {
      background: #00c853;
      color: white;
    }

    #yes:hover {
      transform: scale(1.1);
    }

    #no {
      background: #d50000;
      color: white;
      position: absolute;
    }

    #message {
      font-size: 1.8rem;
      margin-top: 20px;
      display: none;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity: 1; }
      to { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="card">
  <h1 id="text"></h1>
  <button id="yes" class="btn">Yes 💘</button>
  <button id="no" class="btn">No ❌</button>
  <div id="message"></div>
</div>

<script>
  const HER_NAME = "Divya Mishra"; // 🔥 CHANGE NAME HERE

  const textElement = document.getElementById("text");
  const fullText = `Hey ${HER_NAME}... will you be my girlfriend? 💖`;

  // Typing animation
  let i = 0;
  function typeWriter() {
    if (i < fullText.length) {
      textElement.innerHTML += fullText.charAt(i);
      i++;
      setTimeout(typeWriter, 50);
    }
  }
  typeWriter();

  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");
  const message = document.getElementById("message");

  // Smarter NO escape
  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  let confirmStep = false;

  yesBtn.addEventListener("click", () => {
    if (!confirmStep) {
      textElement.innerHTML = "Think again, last chance";
      confirmStep = true;
      return;
    }

    // Final moment
    textElement.innerHTML = "";
    yesBtn.style.display = "none";
    noBtn.style.display = "none";

    message.innerHTML = `YAYYY ${HER_NAME}! 🎉💖 <br> You are late, Meri market value badh gayi h ab  😌`;
    message.style.display = "block";

    // Confetti
    confetti({ particleCount: 250, spread: 120 });

    // Floating hearts
    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 20) + "px";

      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }, 250);
  });
</script>

</body>
</html>
